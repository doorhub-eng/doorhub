<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORHUB - Вход</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">DOORHUB</a>
    <div id="nav-auth-state"></div>
  </nav>

  <main class="container auth-container">
    <div class="auth-box">
      <div class="auth-tabs">
        <button id="tab-login" class="active" onclick="switchAuthTab('login')">Вход</button>
        <button id="tab-register" onclick="switchAuthTab('register')">Регистрация</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Пароль" required>
        <button type="submit" class="btn-green">Войти</button>
        <p id="login-error" class="error-msg"></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input type="text" id="reg-nickname" placeholder="Никнейм" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Пароль (минимум 6 симв.)" required>
        <button type="submit" class="btn-green">Зарегистрироваться</button>
        <p id="reg-error" class="error-msg"></p>
      </form>
    </div>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
