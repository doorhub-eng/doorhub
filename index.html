<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORHUB - Лента</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">DOORHUB</a>
    <div id="nav-auth-state">
      <!-- Заполняется из JS -->
    </div>
  </nav>

  <main class="container">
    <div class="feed-header">
      <h2>Свежие новости и статьи</h2>
      <div class="feed-controls">
        <input type="text" id="search-input" placeholder="Поиск постов...">
        <select id="sort-select">
          <option value="new">Сначала новые</option>
          <option value="popular">Сначала популярные</option>
          <option value="old">Сначала старые</option>
        </select>
      </div>
    </div>
    
    <div id="posts-feed" class="posts-grid">
      <p class="loading">Загрузка постов...</p>
    </div>
  </main>

  <script src="app.js?v=4"></script>
</body>
</html>
